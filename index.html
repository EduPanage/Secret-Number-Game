<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number's Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 id="title">Secret Number Game</h1>
        <p id="text">Press the button to start the game!</p>
        <input type="number">
        <button id="start_button">Start</button>
        <button id="guess_button">Guess</button>
        <button id="restart_button">Restart</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
